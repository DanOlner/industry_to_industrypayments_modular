name: Update docs index

on:
  push:
    branches: [master]
    paths:
      - 'docs/**'

jobs:
  update-index:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Generate docs/index.html
        run: bash scripts/generate-index.sh

      - name: Commit updated index if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/index.html
          git diff --cached --quiet && echo "No changes to index." && exit 0
          git commit -m "Auto-update docs/index.html"
          git push
