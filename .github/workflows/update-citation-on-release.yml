name: Update citation metadata on release

on:
  release:
    types: [published]

jobs:
  update-citation:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: master

      - name: Update version and date, then fetch DOI from Zenodo
        env:
          GITHUB_REPO: ${{ github.repository }}
        run: bash scripts/update-citation-metadata.sh "${{ github.event.release.tag_name }}"

      - name: Commit and push updated metadata
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CITATION.cff .zenodo.json
          git diff --cached --quiet && echo "No changes to commit." && exit 0
          git commit -m "Auto-update citation metadata for ${{ github.event.release.tag_name }}"
          git push
